[package]
name = "git-metadata"
version = "0.0.0"
edition = "2024"
publish = true
license = "MIT OR Apache-2.0"

[[bin]]
name = "git-metadata"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5.60", features = ["derive"] }
clap_mangen = "0.2.31"
git2 = "0.20.4"

[dev-dependencies]
tempfile = "3.27.0"
